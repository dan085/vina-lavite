<header class="header">
  <div class="container">
    <a routerLink="/" class="logo">
      <span class="logo-icon">🍷</span>
      <span class="logo-text">Viña La Vite</span>
    </a>
    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ t().nav.home }}</a>
      <a routerLink="/vinos" routerLinkActive="active">{{ t().nav.wines }}</a>
      <a routerLink="/galeria" routerLinkActive="active">{{ t().nav.gallery }}</a>
      <a routerLink="/sobre-nosotros" routerLinkActive="active">{{ t().nav.about }}</a>
      <a routerLink="/contacto" routerLinkActive="active">{{ t().nav.contact }}</a>
      <div class="lang-switcher">
        <button (click)="changeLanguage('es')" [class.active]="translationService.currentLang() === 'es'">ES</button>
        <button (click)="changeLanguage('en')" [class.active]="translationService.currentLang() === 'en'">EN</button>
        <button (click)="changeLanguage('it')" [class.active]="translationService.currentLang() === 'it'">IT</button>
      </div>
    </nav>
    <button class="menu-toggle" (click)="toggleMenu()">
      <span class="hamburger"></span>
    </button>
  </div>
  <div class="mobile-menu" [class.active]="menuOpen()">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">{{ t().nav.home }}</a>
    <a routerLink="/vinos" routerLinkActive="active" (click)="closeMenu()">{{ t().nav.wines }}</a>
    <a routerLink="/galeria" routerLinkActive="active" (click)="closeMenu()">{{ t().nav.gallery }}</a>
    <a routerLink="/sobre-nosotros" routerLinkActive="active" (click)="closeMenu()">{{ t().nav.about }}</a>
    <a routerLink="/contacto" routerLinkActive="active" (click)="closeMenu()">{{ t().nav.contact }}</a>
    <div class="mobile-lang-switcher">
      <button (click)="changeLanguage('es')" [class.active]="translationService.currentLang() === 'es'">ES</button>
      <button (click)="changeLanguage('en')" [class.active]="translationService.currentLang() === 'en'">EN</button>
      <button (click)="changeLanguage('it')" [class.active]="translationService.currentLang() === 'it'">IT</button>
    </div>
  </div>
</header>

<main class="main">
  <router-outlet />
</main>
